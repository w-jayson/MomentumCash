services:
  postgres:
    image: postgres:16-alpine
    container_name: momentumcash-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - momentumcash-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: momentumcash-api
    environment:
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:5000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - momentumcash-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: momentumcash-web
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - momentumcash-net

volumes:
  pgdata:

networks:
  momentumcash-net:
    driver: bridge
