<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MomentumCash</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">

    <header class="header">
      <h1 class="header__title">MomentumCash</h1>
      <div class="header__summary">
        <div class="summary-card summary-card--balance">
          <span class="summary-card__label">Saldo</span>
          <span class="summary-card__value" id="totalBalance">R$ 0,00</span>
        </div>
        <div class="summary-card summary-card--income">
          <span class="summary-card__label">Receitas</span>
          <span class="summary-card__value" id="totalIncome">R$ 0,00</span>
        </div>
        <div class="summary-card summary-card--expense">
          <span class="summary-card__label">Despesas</span>
          <span class="summary-card__value" id="totalExpense">R$ 0,00</span>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="form-section" id="formSection">
        <h2 class="form-section__title" id="formTitle">Nova Transação</h2>
        <form id="transactionForm" class="form" novalidate>
          <input type="hidden" id="transactionId">
          <div class="form__group">
            <label for="description" class="form__label">Descrição</label>
            <input type="text" id="description" class="form__input" placeholder="Ex: Supermercado" required maxlength="200">
          </div>
          <div class="form__row">
            <div class="form__group">
              <label for="amount" class="form__label">Valor</label>
              <input type="number" id="amount" class="form__input" placeholder="0,00" step="0.01" min="0.01" required>
            </div>
            <div class="form__group">
              <label for="type" class="form__label">Tipo</label>
              <select id="type" class="form__input" required>
                <option value="1">Receita</option>
                <option value="2">Despesa</option>
              </select>
            </div>
          </div>
          <div class="form__row">
            <div class="form__group">
              <label for="date" class="form__label">Data</label>
              <input type="date" id="date" class="form__input" required>
            </div>
            <div class="form__group">
              <label for="category" class="form__label">Categoria</label>
              <select id="category" class="form__input">
                <option value="">Sem categoria</option>
              </select>
            </div>
          </div>
          <div class="installment-section" id="installmentSection" style="display:none;">
            <div class="form__group">
              <label class="form__label form__label--checkbox">
                <input type="checkbox" id="isInstallment"> Compra parcelada?
              </label>
            </div>
            <div id="installmentFields" style="display:none;">
              <div class="form__row">
                <div class="form__group">
                  <label for="installments" class="form__label">Quantidade de parcelas</label>
                  <input type="number" id="installments" class="form__input" placeholder="12" min="2" step="1">
                </div>
                <div class="form__group">
                  <label for="installmentValue" class="form__label">Valor da parcela</label>
                  <input type="number" id="installmentValue" class="form__input" placeholder="0,00" step="0.01" min="0.01">
                </div>
              </div>
            </div>
          </div>
          <div class="form__actions">
            <button type="submit" class="btn btn--primary" id="submitBtn">Salvar</button>
            <button type="button" class="btn btn--secondary" id="cancelBtn" style="display:none;">Cancelar</button>
          </div>
        </form>
      </section>

      <section class="history-section">
        <div class="history-section__header">
          <h2 class="history-section__title">Histórico</h2>
          <div class="history-section__filter">
            <select id="filterCategory" class="form__input" style="width:auto;">
              <option value="">Todas categorias</option>
            </select>
            <select id="filterType" class="form__input" style="width:auto;">
              <option value="">Todos os tipos</option>
              <option value="1">Receitas</option>
              <option value="2">Despesas</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table" id="transactionTable">
            <thead>
              <tr>
                <th>Data</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Valor</th>
                <th>Tipo</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr class="table__empty">
                <td colspan="6">Nenhuma transação registrada.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>MomentumCash &copy; 2026</p>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="confirmModal">
      <p id="modalMessage">Tem certeza que deseja excluir esta transação?</p>
      <div class="modal__actions">
        <button class="btn btn--danger" id="modalConfirm">Excluir</button>
        <button class="btn btn--secondary" id="modalCancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js?v=2"></script>
  <script src="js/api.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
